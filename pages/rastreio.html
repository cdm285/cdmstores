<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rastrear pedido CDM STORES — acompanhe sua entrega em tempo real.">
    <title>Rastreio de Pedido · CDM STORES</title>

    <link rel="stylesheet" href="../css/output.css">
    <style>
        .rastreio-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 64px 24px 80px;
            text-align: center;
        }

        .rastreio-wrap h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .rastreio-wrap > p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .rastreio-form {
            display: flex;
            gap: 10px;
        }

        .rastreio-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-white);
        }

        .rastreio-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .btn-rastrear {
            padding: 12px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-rastrear:hover {
            background: var(--primary-hover);
        }

        .rastreio-resultado {
            margin-top: 28px;
            padding: 20px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.7;
            display: none;
        }

        .rastreio-resultado.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .rastreio-form { flex-direction: column; }
            .btn-rastrear { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        <p>🚚 Rastreie seu pedido em tempo real</p>
    </div>

    <header class="header" id="site-header">
        <div class="left-area">
            <nav class="menu" aria-label="Navegação principal">
                <a href="../index.html" data-i18n="nav.home">Início</a>
                <a href="../index.html#produtos" data-i18n="nav.products">Produtos</a>
                <a href="rastreio.html" data-i18n="nav.track" aria-current="page">Rastreio</a>
            </nav>
        </div>
        <div class="logo-area">
            <a href="../index.html" aria-label="CDM STORES - Página inicial">
                <img src="../assets/logo.png" class="logo" alt="CDM STORES">
            </a>
        </div>
        <div class="right-area">
            <div class="lang-selector" role="group" aria-label="Selecionar idioma">
                <button class="lang-btn active" data-lang="pt" title="Português">
                    <img src="../assets/br.png" alt="Português" width="24" height="24">
                </button>
                <button class="lang-btn" data-lang="en" title="English">
                    <img src="../assets/us.png" alt="English" width="24" height="24">
                </button>
                <button class="lang-btn" data-lang="es" title="Español">
                    <img src="../assets/es.png" alt="Español" width="24" height="24">
                </button>
            </div>
        </div>
    </header>

    <main class="rastreio-wrap">
        <h2 data-i18n="tracking.title">Rastrear Pedido</h2>
        <p data-i18n="tracking.subtitle">Digite o código de rastreio enviado para seu email.</p>

        <div class="rastreio-form">
            <input type="text" id="codigo-rastreio" class="rastreio-input"
                   placeholder="Ex: CDM123456BR"
                   data-i18n-placeholder="tracking.placeholder"
                   aria-label="Código de rastreio"
                   maxlength="30">
            <button class="btn-rastrear" id="btn-rastrear" data-i18n="tracking.button">Rastrear</button>
        </div>

        <div id="resultado-rastreio" class="rastreio-resultado" role="status" aria-live="polite"></div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="footer-bottom">
            <p data-i18n="footer">© 2026 CDM STORES · Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="../js/script.js" defer></script>
    <script src="../frontend-integration.js" defer></script>
</body>
</html>
