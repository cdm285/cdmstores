<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your CDM STORES order — real-time delivery tracking.">
    <title>Track Order · CDM STORES</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <style>
        .rastreio-wrap {
            max-width: 520px;
            margin: 0 auto;
            padding: 64px 24px 80px;
            text-align: center;
        }

        .rastreio-wrap h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .rastreio-wrap > p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .rastreio-form {
            display: flex;
            gap: 10px;
        }

        .rastreio-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-white);
        }

        .rastreio-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .btn-rastrear {
            padding: 12px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s;
        }

        .btn-rastrear:hover {
            background: var(--primary-hover);
        }

        .rastreio-resultado {
            margin-top: 28px;
            padding: 20px;
            background: var(--bg-subtle);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            text-align: left;
            font-size: 0.9rem;
            line-height: 1.7;
            display: none;
        }

        .rastreio-resultado.visible {
            display: block;
        }

        @media (max-width: 480px) {
            .rastreio-form { flex-direction: column; }
            .btn-rastrear { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="promo-bar">
        <p>🚚 Track your order in real time</p>
    </div>

    <header class="header" id="site-header">

        <!-- LOGO -->
        <div class="header-logo">
            <a href="../index.html" aria-label="CDM STORES">
                <img src="../assets/logo-premium.png" class="premium-logo-img" alt="CDM STORES" fetchpriority="high">
            </a>
        </div>

        <!-- NAV DESKTOP -->
        <div class="header-nav-container">
            <nav class="header-nav" aria-label="Main navigation">
                <a href="../index.html" class="nav-link" data-i18n="nav.home">Home</a>
                <a href="../index.html#produtos" class="nav-link" data-i18n="nav.products">Products</a>
                <a href="rastreio.html" class="nav-link" aria-current="page" data-i18n="nav.track">Track Order</a>
            </nav>
            <div class="desktop-lang" role="group" aria-label="Language">
                <button class="desktop-lang-btn" data-lang="pt" aria-pressed="false">PT</button>
                <span class="desktop-lang-sep">|</span>
                <button class="desktop-lang-btn active" data-lang="en" aria-pressed="true">EN</button>
                <span class="desktop-lang-sep">|</span>
                <button class="desktop-lang-btn" data-lang="es" aria-pressed="false">ES</button>
            </div>
        </div>

        <!-- ACTIONS DESKTOP -->
        <div class="header-actions">
            <a href="../index.html#produtos" class="header-cta" data-i18n="nav.products">Products</a>
        </div>

        <!-- HAMBURGER (mobile only) -->
        <button class="hamburger" id="hamburger-btn" aria-label="Open navigation menu" aria-expanded="false" aria-controls="mobile-nav">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>

    </header>

    <!-- MOBILE OFF-CANVAS NAV -->
    <div class="mobile-nav" id="mobile-nav" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Navigation menu">
        <div class="mobile-nav-header">
            <a href="../index.html" class="mobile-nav-logo">CDM STORES</a>
            <button class="mobile-nav-close" id="mobile-nav-close" aria-label="Close menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <nav class="mobile-nav-links" aria-label="Mobile navigation">
            <a href="../index.html" class="mobile-nav-link" data-i18n="nav.home">Home</a>
            <a href="../index.html#produtos" class="mobile-nav-link" data-i18n="nav.products">Products</a>
            <a href="rastreio.html" class="mobile-nav-link" aria-current="page" data-i18n="nav.track">Track Order</a>
        </nav>
        <div class="mobile-nav-footer">
            <div class="mobile-nav-lang-label">Language</div>
            <div class="mobile-lang" role="group" aria-label="Language">
                <button class="mobile-lang-btn" data-lang="pt" aria-pressed="false">PT</button>
                <span class="mobile-lang-sep">|</span>
                <button class="mobile-lang-btn active" data-lang="en" aria-pressed="true">EN</button>
                <span class="mobile-lang-sep">|</span>
                <button class="mobile-lang-btn" data-lang="es" aria-pressed="false">ES</button>
            </div>
        </div>
    </div>
    <div class="mobile-nav-overlay" id="mobile-nav-overlay" aria-hidden="true"></div>

    <main class="rastreio-wrap">
        <h2 data-i18n="tracking.title">Track Order</h2>
        <p data-i18n="tracking.subtitle">Enter the tracking code sent to your email.</p>

        <div class="rastreio-form">
            <input type="text" id="codigo-rastreio" class="rastreio-input"
                   placeholder="Ex: CDM123456BR"
                   data-i18n-placeholder="tracking.placeholder"
                   aria-label="Tracking code"
                   maxlength="30">
            <button class="btn-rastrear" id="btn-rastrear" data-i18n="tracking.button">Track</button>
        </div>

        <div id="resultado-rastreio" class="rastreio-resultado" role="status" aria-live="polite"></div>
    </main>

    <footer class="footer" role="contentinfo">
        <div class="footer-bottom">
            <p data-i18n="footer">© 2026 CDM STORES · All rights reserved.</p>
        </div>
    </footer>

    <script src="../js/script.js" defer></script>
    <script src="../frontend-integration.js" defer></script>
</body>
</html>
