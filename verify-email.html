<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Email - CDM Stores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #00AFFF 0%, #9B4DFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 3rem 2rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            color: #333;
            margin-bottom: 1rem;
            font-size: 1.8rem;
        }

        .message {
            color: #666;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .status.loading {
            background: rgba(0, 175, 255, 0.1);
            color: #00AFFF;
        }

        .status.success {
            background: rgba(42, 127, 42, 0.1);
            color: #2a7f2a;
        }

        .status.error {
            background: rgba(201, 42, 42, 0.1);
            color: #c92a2a;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(0, 175, 255, 0.3);
            border-top-color: #00AFFF;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .btn {
            background: linear-gradient(135deg, #00AFFF 0%, #0088CC 100%);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 175, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: #00AFFF;
            border: 2px solid #00AFFF;
            margin-left: 0.5rem;
        }

        .btn-secondary:hover {
            background: rgba(0, 175, 255, 0.1);
        }

        .details {
            background: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
            color: #666;
        }

        .details code {
            background: rgba(0, 0, 0, 0.1);
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✉️</div>
        <h1>Verificar Email</h1>

        <div id="content">
            <div class="status loading">
                <span class="spinner"></span>
                Verificando seu email...
            </div>
            <p class="message">Por favor, aguarde enquanto processamos sua verificação.</p>
        </div>
    </div>

    <script>
        async function verifyEmail() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showError('Token de verificação não fornecido', '/');
                return;
            }

            try {
                const response = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess(data.message, '/');
                } else {
                    showError(data.error || 'Erro ao verificar email', '/?redirect=login');
                }
            } catch (error) {
                showError('Erro ao conectar ao servidor', '/?redirect=login');
            }
        }

        function showSuccess(message, redirectUrl) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="status success">✓ Sucesso!</div>
                <p class="message">${message}</p>
                <p class="message">Seu email foi verificado com sucesso. Você será redirecionado em breve...</p>
                <div style="margin-top:2rem;">
                    <a href="${redirectUrl}" class="btn">← Voltar ao Início</a>
                </div>
            `;

            setTimeout(() => {
                window.location.href = redirectUrl;
            }, 3000);
        }

        function showError(message, redirectUrl) {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="status error">❌ Erro</div>
                <p class="message">${message}</p>
                <div style="margin-top:2rem;">
                    <a href="${redirectUrl}" class="btn">← Voltar</a>
                </div>
            `;
        }

        // Execute ao carregar
        verifyEmail();
    </script>
</body>
</html>
