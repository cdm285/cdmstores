name: Deploy CDM STORES

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Deploy Cloudflare Worker (backend)
  # ─────────────────────────────────────────────
  deploy-worker:
    name: Worker (API)
    runs-on: ubuntu-latest
    # Só faz deploy real no push para main; PRs ignoram o worker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set worker secrets
        run: |
          echo "${{ secrets.JWT_SECRET }}"              | npx wrangler secret put JWT_SECRET              --env production
          echo "${{ secrets.ADMIN_KEY }}"               | npx wrangler secret put ADMIN_KEY               --env production
          echo "${{ secrets.STRIPE_SECRET_KEY }}"       | npx wrangler secret put STRIPE_SECRET_KEY       --env production
          echo "${{ secrets.STRIPE_WEBHOOK_SECRET }}"   | npx wrangler secret put STRIPE_WEBHOOK_SECRET   --env production
          echo "${{ secrets.RESEND_API_KEY }}"          | npx wrangler secret put RESEND_API_KEY          --env production
          echo "${{ secrets.CJ_API_KEY }}"              | npx wrangler secret put CJ_API_KEY              --env production
          echo "${{ secrets.CJ_API_SECRET }}"           | npx wrangler secret put CJ_API_SECRET           --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─────────────────────────────────────────────
  # JOB 2: Deploy Cloudflare Pages (frontend)
  # ─────────────────────────────────────────────
  deploy-pages:
    name: Pages (Frontend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: cdmstores
          directory: .
          # Em PRs cria preview; em push para main vai para produção
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: '3'
